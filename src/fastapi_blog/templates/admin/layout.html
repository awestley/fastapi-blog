<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Editor{% endblock %} — fastapi-blog</title>
    <link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css">
    <style>
        html { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #2c3e50; }
        body { max-width: 52em; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; }
        h1, h2, h3 { line-height: 1.2; }
        a { color: #1e88e5; }
        code { font-family: "SFMono-Regular", Menlo, Consolas, monospace; font-size: 0.9em; }
        button { font: inherit; padding: 0.4rem 0.8rem; cursor: pointer; }
        input[type="text"], input[type="date"], textarea { font: inherit; padding: 0.4rem; border: 1px solid #ccc; border-radius: 3px; }

        header nav a { margin-right: 1rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.4rem 0.6rem; border-bottom: 1px solid #eee; text-align: left; }
        .actions { display: flex; gap: 0.5rem; }
        .actions button { font-size: 0.8rem; padding: 0.2rem 0.5rem; }
        .badge { display: inline-block; padding: 0.1rem 0.4rem; border-radius: 4px; font-size: 0.8rem; background: #eee; }
        .badge.published { background: #c8e6c9; }
        .badge.draft { background: #ffe0b2; }
        .form-row { margin-bottom: 1rem; }
        .form-row label { display: block; font-weight: bold; margin-bottom: 0.25rem; }
        .form-row input[type="text"], .form-row input[type="date"] { width: 100%; }
        .error { color: #c62828; background: #ffebee; padding: 0.5rem; border-radius: 4px; white-space: pre-wrap; font-family: monospace; font-size: 0.85rem; }
        .hint { color: #888; font-size: 0.85rem; }
    </style>
</head>
<body>
    <header>
        <h1>fastapi-blog editor</h1>
        <nav>
            <a href="{{ admin_prefix }}/">Posts</a>
            <a href="{{ admin_prefix }}/new">+ New</a>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
